name: Demo GIF

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/tui/go.mod

      - name: Build TUI
        run: |
          cd tools/tui && go build -ldflags "-X main.version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)" -o nexus .
          sudo cp nexus /usr/local/bin/nexus

      - name: Install VHS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg chromium-browser fonts-noto-color-emoji

      - name: Install ttyd
        run: |
          curl -sSL -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          sudo cp "$(go env GOPATH)/bin/vhs" /usr/local/bin/vhs

      - name: Generate demo.gif
        env:
          NEXUS_REPO: ${{ github.workspace }}
        run: vhs demo.tape

      - name: Upload demo.gif
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: demo.gif
