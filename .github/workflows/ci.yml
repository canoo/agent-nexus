name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/tui/go.mod

      - name: Build TUI
        run: cd tools/tui && go build -o nexus .

      - name: Vet
        run: cd tools/tui && go vet ./...

  test-install-cycle:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cycle test
        run: bash tests/test-install-cycle.sh --verbose

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: shellcheck setup-nexus.sh teardown-nexus.sh install.sh
